<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checkout - VoltStore</title>

<link rel="stylesheet" href="checkout.css">
</head>   
<body>
<header>
⚡ Checkout - VoltStore
</header>

<div class="container">

<div>

<div class="card">

<h2>📦 Endereço de Entrega</h2>

<input placeholder="Nome Completo">
<input placeholder="Endereço">
<input placeholder="Número">
<input placeholder="Cidade">
<input placeholder="Estado">
<input placeholder="CEP">

</div>

<div class="card">

<h2>🚚 Método de Entrega</h2>

<select>
<option>Frete Econômico - R$ 20</option>
<option>Frete Expresso - R$ 40</option>
<option>Retirar na Loja - Grátis</option>
</select>

</div>

</div>

<div class="card">

<h2>🧾 Resumo do Pedido</h2>

<div class="summary-item">
<span>Galaxy S23 Ultra</span>
<span>R$ 4.999</span>
</div>

<div class="summary-item">
<span>Frete</span>
<span>R$ 20</span>
</div>

<hr>

<div class="total">
Total: R$ 5.019
</div>

<button>
Ir para Pagamento
</button>

</div>

</div>

</body>
</html>
