{% extends 'voltstore/base.html' %}
{% block title %}Minha Conta — VoltStore{% endblock %}
{% block content %}
<div class="container" style="max-width:600px">
  <h1 class="section-title">Minha Conta</h1>

  <div class="card-section">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
      <div style="width:60px;height:60px;border-radius:50%;background:#1e40af;display:flex;align-items:center;justify-content:center;color:white;font-size:22px;font-weight:700">
        {{ user.first_name.0|default:user.username.0|upper }}
      </div>
      <div>
        <p style="font-weight:700;font-size:18px">{{ user.get_full_name|default:user.username }}</p>
        <p style="color:#64748b;font-size:14px">{{ user.email }}</p>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px">
      <a href="{% url 'meus_pedidos' %}" class="btn-detail" style="display:block;padding:12px;text-align:center;border-radius:8px;border:1px solid #e2e8f0">
        📦 Meus Pedidos
      </a>
      <a href="{% url 'logout' %}" class="btn-detail" style="display:block;padding:12px;text-align:center;border-radius:8px;border:1px solid #fecaca;color:#dc2626">
        Sair da conta
      </a>
    </div>
  </div>
</div>
{% endblock %}
