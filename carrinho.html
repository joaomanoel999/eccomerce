<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="carrinho.css">
<script src="carrinho.js"></script>
<title>Carrinho - VoltStore</title>


</head>

<body>

<header>
⚡ VoltStore
<span>🛒 Carrinho</span>
</header>

<div class="container" id="cart">

<div class="cart-item" data-price="4999">

<img src="https://images.unsplash.com/photo-1592750475338-74b7b21085ab?w=400">

<div class="item-info">
<h3>Samsung Galaxy S23 Ultra</h3>
<div class="price">R$ 4.999</div>
</div>

<div class="quantity">
<button onclick="changeQty(this,-1)">-</button>
<span class="qty">1</span>
<button onclick="changeQty(this,1)">+</button>
</div>

<button class="remove-btn" onclick="removeItem(this)">Remover</button>

</div>


<div class="cart-item" data-price="1899">

<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400">

<div class="item-info">
<h3>Sony WH-1000XM5</h3>
<div class="price">R$ 1.899</div>
</div>

<div class="quantity">
<button onclick="changeQty(this,-1)">-</button>
<span class="qty">1</span>
<button onclick="changeQty(this,1)">+</button>
</div>

<button class="remove-btn" onclick="removeItem(this)">Remover</button>

</div>


<div class="total-box">

<div class="total" id="total">
Total: R$ 0
</div>

<button class="checkout-btn">
Finalizar Compra
</button>

</div>

</div>



</body>
</html>
